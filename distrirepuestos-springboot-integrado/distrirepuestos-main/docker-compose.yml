services:
  mysql:
    image: mysql:8.0
    container_name: distrirepuestos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: distrirepuestos_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      TZ: America/Bogota
    ports:
      - "3307:3306"
    volumes:
      - distrirepuestos_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: distrirepuestos-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ""
      PMA_ALLOW_NO_PASSWORD: "yes"
    ports:
      - "8081:80"

volumes:
  distrirepuestos_mysql_data:
