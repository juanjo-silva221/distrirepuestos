services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 3000
      DB_CLIENT: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: motorepuestos
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./motorepuestos-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    depends_on:
      - backend
    ports:
      - "5173:80"
